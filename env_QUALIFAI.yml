name: qualifai
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.8
  - numpy
  - pandas
  - matplotlib
  - scikit-image
  - scikit-learn
  - scipy
  - seaborn
  - tifffile
  - pip:
    - keras==2.4.0
    - Keras-Applications==1.0.7
    - Keras-Preprocessing==1.1.2
    - tensorflow==2.4.1
    - segmentation-models==1.0.1
    - opencv-python==4.7.0.68
    - matplotlib-inline
    - pickleshare
